<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh mục - Coffee Booking Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Animate -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <!-- CSS tùy chỉnh -->
    <link rel="stylesheet" href="/helllcoffe/css/admin.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
        <div class="container py-2">
            <a href="/helllcoffe/admin.html" class="navbar-brand fw-bold d-flex align-items-center gap-2">
                <span>☕</span> Coffee Booking Admin
            </a>
            <div class="d-flex align-items-center gap-2">
                <a href="/helllcoffe/admin.html" class="btn btn-outline-light btn-sm rounded-pill px-3">
                    <i class="bi bi-speedometer2 me-1"></i> Dashboard
                </a>
                <a href="/helllcoffe/index.html" class="btn btn-warning btn-sm rounded-pill px-3 fw-semibold">
                    <i class="bi bi-house-door me-1"></i> Trang khách
                </a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container py-5 my-auto">
        <!-- Tiêu đề & Nút thêm -->
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <div>
                <span class="badge bg-success-subtle text-success border border-success-subtle mb-1 px-3 py-1 rounded-pill">Quản trị hệ thống</span>
                <h2 class="fw-bold mb-0 text-dark">
                    📂 Quản lý Danh mục
                </h2>
                <p class="text-muted small mb-0 mt-1">
                    Thêm, chỉnh sửa và quản lý danh mục đồ uống nhanh chóng.
                </p>
            </div>
            <button class="btn btn-success btn-lg rounded-pill px-4 shadow-sm fw-bold d-inline-flex align-items-center justify-content-center gap-2"
                data-bs-toggle="modal"
                data-bs-target="#categoryModal">
                <i class="bi bi-plus-circle-fill"></i> Thêm danh mục
            </button>
        </div>

        <!-- Thanh tìm kiếm -->
        <div class="row mb-4">
            <div class="col-lg-5">
                <div class="input-group input-group-lg shadow-sm rounded-pill overflow-hidden border">
                    <span class="input-group-text bg-white border-0 ps-4 text-muted">
                        <i class="bi bi-search"></i>
                    </span>
                    <input id="searchCategory" class="form-control border-0 shadow-none ps-2" placeholder="Tìm kiếm nhanh danh mục...">
                </div>
            </div>
        </div>

        <!-- Bảng hiển thị -->
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="table-responsive mb-0">
                <table class="table table-hover align-middle bg-white mb-0">
                    <thead class="table-dark text-center text-uppercase fs-7">
                        <tr>
                            <th width="100" class="py-3">ID</th>
                            <th class="text-start py-3 ps-4">Tên danh mục</th>
                            <th width="180" class="py-3">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="tableCategory">
                        <!-- Dữ liệu được render động qua categories.js -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Thêm/Sửa Danh mục -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg overflow-hidden">
                <div class="modal-header bg-dark text-white border-0 py-3">
                    <h5 class="modal-title fw-bold d-flex align-items-center gap-2">
                        <i class="bi bi-folder-fill text-warning"></i> Thông tin Danh mục
                    </h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 bg-white">
                    <input type="hidden" id="categoryId">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Tên danh mục</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-tag-fill text-muted"></i></span>
                            <input id="categoryName" class="form-control border-start-0 bg-light shadow-none" placeholder="Nhập tên danh mục (VD: Cà phê, Trà...)">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 bg-light px-4 pb-3">
                    <button class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">
                        Đóng
                    </button>
                    <button class="btn btn-success rounded-pill px-4 fw-bold shadow-sm" onclick="saveCategory()">
                        <i class="bi bi-floppy-fill me-1"></i> Lưu lại
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white mt-auto py-3 text-center small">
        <p class="mb-0 text-light opacity-75">© 2026 Coffee Booking Admin. All Rights Reserved.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <!-- API -->
    <script src="/helllcoffe/js/api.js"></script>
    <!-- Categories JS -->
    <script src="/helllcoffe/js/categories.js"></script>

</body>

</html>
