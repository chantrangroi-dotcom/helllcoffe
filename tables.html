<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Bàn - Coffee Booking Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Animate CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
        <div class="container py-2">
            <a href="index.html" class="navbar-brand fw-bold d-flex align-items-center gap-2">
                <span>☕</span> Coffee Booking Admin
            </a>
            <div class="d-flex align-items-center gap-2">
                <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill px-3">
                    <i class="bi bi-speedometer2 me-1"></i> Dashboard
                </a>
                <a href="../index.html" class="btn btn-warning btn-sm rounded-pill px-3 fw-semibold">
                    <i class="bi bi-house-door me-1"></i> Trang khách
                </a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container py-5 my-auto">
        <!-- Tiêu đề & Nút thêm -->
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <div>
                <span class="badge bg-success-subtle text-success border border-success-subtle mb-1 px-3 py-1 rounded-pill">Quản trị không gian</span>
                <h2 class="fw-bold mb-0 text-dark">
                    🪑 Quản lý Bàn
                </h2>
                <p class="text-muted small mb-0 mt-1">
                    Thêm mới, chỉnh sửa thông tin hoặc cập nhật trạng thái bàn trong quán.
                </p>
            </div>
            <button class="btn btn-success btn-lg rounded-pill px-4 shadow-sm fw-bold d-inline-flex align-items-center justify-content-center gap-2"
                data-bs-toggle="modal"
                data-bs-target="#tableModal">
                <i class="bi bi-plus-circle-fill"></i> Thêm bàn
            </button>
        </div>

        <!-- Search -->
        <div class="row mb-4">
            <div class="col-lg-5">
                <div class="input-group input-group-lg shadow-sm rounded-pill overflow-hidden border bg-white">
                    <span class="input-group-text bg-white border-0 ps-4 text-muted">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="text" id="searchTable" class="form-control border-0 shadow-none ps-2" placeholder="Tìm mã bàn...">
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="table-responsive mb-0">
                <table class="table table-hover align-middle bg-white mb-0">
                    <thead class="table-dark text-center text-uppercase fs-7">
                        <tr>
                            <th width="80" class="py-3">ID</th>
                            <th class="text-start py-3 ps-3">Mã bàn</th>
                            <th width="150" class="py-3">Sức chứa</th>
                            <th width="180" class="py-3">Trạng thái</th>
                            <th width="180" class="py-3">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="tableTables">
                        <!-- Render dynamically by tables.js -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Thông tin Bàn -->
    <div class="modal fade" id="tableModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg overflow-hidden">
                <div class="modal-header bg-dark text-white border-0 py-3">
                    <h5 class="modal-title fw-bold d-flex align-items-center gap-2">
                        <i class="bi bi-grid-1x2-fill text-warning"></i> Thông tin Bàn
                    </h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 bg-white">
                    <input type="hidden" id="tableId">

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Mã bàn</label>
                        <input id="tableName" class="form-control bg-light shadow-none" placeholder="Ví dụ: B01">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Sức chứa (Người)</label>
                        <input type="number" id="capacity" class="form-control bg-light shadow-none" placeholder="Ví dụ: 4">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Trạng thái</label>
                        <select id="status" class="form-select bg-light shadow-none">
                            <option value="Trống">Trống</option>
                            <option value="Đã đặt">Đã đặt</option>
                            <option value="Đang phục vụ">Đang phục vụ</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-0 bg-light px-4 pb-3">
                    <button class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">
                        Đóng
                    </button>
                    <button class="btn btn-success rounded-pill px-4 fw-bold shadow-sm" onclick="saveTable()">
                        <i class="bi bi-floppy-fill me-1"></i> Lưu lại
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white mt-auto py-3 text-center small">
        <p class="mb-0 text-light opacity-75">© 2026 Coffee Booking Admin. All Rights Reserved.</p>
    </footer>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <!-- API -->
    <script src="../js/api.js"></script>
    <!-- JS -->
    <script src="../js/tables.js"></script>

</body>

</html>
